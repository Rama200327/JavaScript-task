<!DOCTYPE html>
<html>
<head>
    <title>Task 6 - User Information</title>
</head>
<body>

<script>
    let name = prompt("Enter your name:");
    let age = prompt("Enter your age:");
    let city = prompt("Enter your city:");

    let message = `Hello ${name}!\nYou are ${age} years old and you live in ${city}.`;

    console.log(message);
    alert(message);
    document.write(`Hello ${name}!<br>You are ${age} years old and you live in ${city}.`);
</script>

</body>
</html>
