<!DOCTYPE html>
<html>
<head>
    <title>Task 1 - Calculator</title>
</head>
<body>

<p id="result"></p>

<script>
    let operation = prompt("Enter the operation (+, -, *, /):");
    let num1 = Number(prompt("Enter the first number:"));
    let num2 = Number(prompt("Enter the second number:"));

    let answer;

    if (operation === "+") {
        answer = num1 + num2;
    } else if (operation === "-") {
        answer = num1 - num2;
    } else if (operation === "*") {
        answer = num1 * num2;
    } else if (operation === "/") {
        answer = num1 / num2;
    } else {
        answer = "Invalid operation!";
    }

    console.log(`${num1} ${operation} ${num2} = ${answer}`);
    document.getElementById("result").innerHTML = `${num1} ${operation} ${num2} = ${answer}`;
</script>

</body>
</html>
