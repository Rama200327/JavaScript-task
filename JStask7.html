<!DOCTYPE html>
<html>
<head>
    <title>Task 7 - Even or Odd</title>
</head>
<body>

<script>
    let num = Number(prompt("Enter a number:"));

    if (num % 2 === 0) {
        alert(`The number ${num} is Even`);
    } else {
        alert(`The number ${num} is Odd`);
    }
</script>

</body>
</html>
