<!DOCTYPE html>
<html>
<head>
    <title>Task 8 - Age Category</title>
</head>
<body>

<script>
    let age = Number(prompt("Enter your age:"));

    let category;

    if (age < 13) {
        category = "Child";
    } else if (age >= 13 && age <= 19) {
        category = "Teenager";
    } else if (age >= 20 && age <= 59) {
        category = "Adult";
    } else {
        category = "Senior";
    }

    alert(`You are an ${category}`);
    console.log(`You are an ${category}`);
</script>

</body>
</html>
