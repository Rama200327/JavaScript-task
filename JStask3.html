<!DOCTYPE html>
<html>
<head>
    <title>Task 3 - Pi Constant</title>
</head>
<body>

<script>
    const PI = 3.14159;
    let radius = 7;

    let area = PI * radius * radius;
    let circumference = 2 * PI * radius;

    document.write(`Area = ${PI} × ${radius}² = ${area}`);
    document.write(`<br>`);
    document.write(`Circumference = 2 × ${PI} × ${radius} = ${circumference}`);

    console.log(`Area = ${PI} × ${radius}² = ${area}`);
    console.log(`Circumference = 2 × ${PI} × ${radius} = ${circumference}`);
</script>

</body>
</html>
